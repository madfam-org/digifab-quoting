# Template — populate with real values via `kubectl create secret` or
# eventually an ExternalSecret (Vault). Keys here MUST stay in sync with
# what the deployment manifests `envFrom` or env-name a Secret reference.
#
# Apply (one-shot, manual provisioning):
#   cp secrets-template.yaml secrets.local.yaml
#   # Fill in the empty values
#   kubectl apply -f secrets.local.yaml
#   kubectl rollout restart deployment -n digifab-quoting digifab-quoting-web digifab-quoting-api
#
# DO NOT commit secrets.local.yaml. It's gitignored at the repo root.
apiVersion: v1
kind: Secret
metadata:
  name: digifab-quoting-secrets
  namespace: digifab-quoting
type: Opaque
stringData:
  # --- Core platform ---
  NODE_ENV: "production"
  DATABASE_URL: ""                  # postgres://USER:PASS@HOST:5432/cotiza
  REDIS_URL: ""                     # redis://HOST:6379/14
  JWT_SECRET: ""                    # internal API JWT signing (NestJS)
  LOG_TO_FILE: "false"

  # --- NextAuth (web) ---
  # Generate with: openssl rand -base64 32
  # MUST be set, otherwise next-auth returns ?error=Configuration on every
  # signIn call and /api/auth/session returns 500 (CLIENT_FETCH_ERROR).
  NEXTAUTH_SECRET: ""

  # --- Janua OIDC ---
  # Register a Janua OAuth client at https://auth.madfam.io with:
  #   redirect_uri: https://cotiza.studio/api/auth/callback/janua
  #   grant_types: authorization_code, refresh_token
  #   scopes: openid profile email
  # Then paste the issued credentials below. JANUA_ISSUER defaults to
  # https://auth.madfam.io if unset.
  JANUA_ISSUER: "https://auth.madfam.io"
  JANUA_CLIENT_ID: ""
  JANUA_CLIENT_SECRET: ""

  # --- Stripe (payments) ---
  # REMOVED 2026-04-25: Cotiza no longer holds Stripe keys. Per operator
  # directive, ONE set of Stripe keys lives at Dhanam, every other platform
  # funnels through Dhanam's billing API. See DHANAM_API_URL +
  # DHANAM_BILLING_SECRET below for the keys cotiza-api now uses.

  # --- Forgesight (inbound pricing webhook) ---
  FORGESIGHT_WEBHOOK_SECRET: ""

  # --- Yantra4D (outbound quote-lifecycle webhook) ---
  YANTRA4D_API_URL: ""
  YANTRA4D_WEBHOOK_SECRET: ""

  # --- Dhanam billing relay + FX (RFC 0011) ---
  # All FX/currency lookups should funnel through Dhanam's /v1/fx/* surface
  # (RFC 0011 Phase 1, shipped 2026-04-25). Cotiza's CurrencyService is the
  # consumer; this is the bearer + URL it uses.
  DHANAM_API_URL: ""                # https://api.dhan.am
  DHANAM_API_TOKEN: ""              # service token issued by Dhanam
  DHANAM_WEBHOOK_URL: ""            # for outbound payment events
  DHANAM_WEBHOOK_SECRET: ""         # HMAC-SHA256 shared secret

  # --- Phase D outbound integrations (fire on ORDERED quote transitions) ---
  KARAFIEL_API_URL: ""
  KARAFIEL_SERVICE_TOKEN: ""        # Janua-minted bearer
  KARAFIEL_EMISOR_RFC: ""
  KARAFIEL_CREDENTIAL_ID: ""
  DHANAM_BILLING_SECRET: ""         # for milestone invoice HMAC
  PRAVARA_API_URL: ""
  PRAVARA_DISPATCH_SECRET: ""

  # --- PhyndCRM (engagement projection inbound) ---
  PHYNECRM_INBOUND_SECRET: ""       # HMAC for incoming engagement webhooks
  PHYNECRM_ENGAGEMENT_SECRET: ""    # HMAC for outgoing engagement events

  # --- AWS / S3 / KMS ---
  S3_BUCKET: "cotiza-uploads"
  S3_REGION: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  KMS_KEY_ID: ""

  # --- Currency / FX ---
  # Cotiza routes /api/v1/currency/rates through Dhanam's /v1/fx/* surface
  # per RFC 0011 (FX as platform service, Phase 1 shipped 2026-04-25).
  # No openexchangerates key needed — Dhanam owns FX provider relationships.
  # Phase 2 of RFC 0011 (consumer migration) wires the actual call swap.
