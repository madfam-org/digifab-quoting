apiVersion: apps/v1
kind: Deployment
metadata:
  name: digifab-quoting-api
  namespace: digifab-quoting
  labels:
    app: digifab-quoting-api
    app.kubernetes.io/name: digifab-quoting-api
    app.kubernetes.io/part-of: digifab-quoting
spec:
  replicas: 2
  selector:
    matchLabels:
      app: digifab-quoting-api
  template:
    metadata:
      labels:
        app: digifab-quoting-api
        app.kubernetes.io/name: digifab-quoting-api
        app.kubernetes.io/part-of: digifab-quoting
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
      - name: ghcr-credentials
      containers:
      - name: digifab-quoting-api
        image: ghcr.io/madfam-org/digifab-quoting/api:latest
        ports:
        - containerPort: 4000
          name: http
        envFrom:
        - secretRef:
            name: digifab-quoting-secrets
            optional: true
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        securityContext:
          privileged: false
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        startupProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 4000
          periodSeconds: 10
          # Explicit timeoutSeconds — k8s default is 1s, which is too tight
          # for a NestJS handler under load (GC pauses, Prisma pool init).
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          periodSeconds: 30
          # Default 1s timeout was killing the container with exit 137
          # after three consecutive >1s healthcheck responses (33 restarts
          # in 173 min observed 2026-05-05). 5s is generous enough that
          # only a genuinely hung process triggers the kill.
          timeoutSeconds: 5
          failureThreshold: 3
