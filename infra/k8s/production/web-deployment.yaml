apiVersion: apps/v1
kind: Deployment
metadata:
  name: digifab-quoting-web
  namespace: digifab-quoting
  labels:
    app: digifab-quoting-web
    app.kubernetes.io/name: digifab-quoting-web
    app.kubernetes.io/part-of: digifab-quoting
spec:
  replicas: 1
  selector:
    matchLabels:
      app: digifab-quoting-web
  template:
    metadata:
      labels:
        app: digifab-quoting-web
        app.kubernetes.io/name: digifab-quoting-web
        app.kubernetes.io/part-of: digifab-quoting
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
      - name: ghcr-credentials
      containers:
      - name: digifab-quoting-web
        image: ghcr.io/madfam-org/digifab-quoting/web:latest
        ports:
        - containerPort: 3000
          name: http
        envFrom:
        - secretRef:
            name: digifab-quoting-secrets
            optional: true
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        startupProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          periodSeconds: 30
