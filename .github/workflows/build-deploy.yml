name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**']
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build, Push & Update Manifests
    runs-on: ${{ vars.ARC_BOOTSTRAP_COMPLETE == 'true' && 'madfam-runners-blue' || 'ubuntu-latest' }}
    permissions:
      contents: write
      packages: write
      id-token: write  # cosign keyless signing

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.MADFAM_BOT_PAT }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api
        uses: docker/build-push-action@v5
        id: build-api
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/madfam-org/digifab-quoting/api:${{ github.sha }}
            ghcr.io/madfam-org/digifab-quoting/api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push web
        uses: docker/build-push-action@v5
        id: build-web
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/madfam-org/digifab-quoting/web:${{ github.sha }}
            ghcr.io/madfam-org/digifab-quoting/web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build and push worker
        uses: docker/build-push-action@v5
        id: build-worker
        with:
          context: apps/worker
          file: apps/worker/Dockerfile
          push: true
          tags: |
            ghcr.io/madfam-org/digifab-quoting/worker:${{ github.sha }}
            ghcr.io/madfam-org/digifab-quoting/worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Sign images with cosign
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes ghcr.io/madfam-org/digifab-quoting/api@${{ steps.build-api.outputs.digest }}
          cosign sign --yes ghcr.io/madfam-org/digifab-quoting/web@${{ steps.build-web.outputs.digest }}
          cosign sign --yes ghcr.io/madfam-org/digifab-quoting/worker@${{ steps.build-worker.outputs.digest }}

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update api image digest
        working-directory: infra/k8s/production
        run: |
          kustomize edit set image ghcr.io/madfam-org/digifab-quoting/api=ghcr.io/madfam-org/digifab-quoting/api@${{ steps.build-api.outputs.digest }}

      - name: Update web image digest
        working-directory: infra/k8s/production
        run: |
          kustomize edit set image ghcr.io/madfam-org/digifab-quoting/web=ghcr.io/madfam-org/digifab-quoting/web@${{ steps.build-web.outputs.digest }}

      - name: Update worker image digest
        working-directory: infra/k8s/production
        run: |
          kustomize edit set image ghcr.io/madfam-org/digifab-quoting/worker=ghcr.io/madfam-org/digifab-quoting/worker@${{ steps.build-worker.outputs.digest }}

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/production/kustomization.yaml
          git diff --staged --quiet || git commit -m "ci: update image digests [skip ci]"
          git push
