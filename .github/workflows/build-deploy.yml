name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**']
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build, Push & Update Manifests
    runs-on: ${{ vars.ARC_BOOTSTRAP_COMPLETE == 'true' && 'madfam-runners-blue' || 'ubuntu-latest' }}
    permissions:
      contents: write
      packages: write
      id-token: write  # cosign keyless signing

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.MADFAM_BOT_PAT }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        continue-on-error: true
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@v5
        id: build-web
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/madfam-org/digifab-quoting/web:${{ github.sha }}
            ghcr.io/madfam-org/digifab-quoting/web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Sign web image with cosign
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes ghcr.io/madfam-org/digifab-quoting/web@${{ steps.build-web.outputs.digest }}

      - name: Build and push worker
        uses: docker/build-push-action@v5
        id: build-worker
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: |
            ghcr.io/madfam-org/digifab-quoting/worker:${{ github.sha }}
            ghcr.io/madfam-org/digifab-quoting/worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Sign worker image with cosign
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes ghcr.io/madfam-org/digifab-quoting/worker@${{ steps.build-worker.outputs.digest }}

      - name: Install kustomize
        run: |
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.6.0/kustomize_v5.6.0_linux_amd64.tar.gz" | tar xz
          sudo mv kustomize /usr/local/bin/

      - name: Update image digests
        working-directory: infra/k8s/production
        run: |
          kustomize edit set image ghcr.io/madfam-org/digifab-quoting/web=ghcr.io/madfam-org/digifab-quoting/web@${{ steps.build-web.outputs.digest }}
          kustomize edit set image ghcr.io/madfam-org/digifab-quoting/worker=ghcr.io/madfam-org/digifab-quoting/worker@${{ steps.build-worker.outputs.digest }}

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/production/kustomization.yaml
          git diff --staged --quiet || git commit -m "ci: update image digests [skip ci]"
          git push
