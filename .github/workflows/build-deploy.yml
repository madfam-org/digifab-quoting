name: Build & Deploy

# Caller for the shared reusable workflow in madfam-org/enclii.
# See: https://github.com/madfam-org/enclii/blob/main/docs/reusable-workflows.md

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**']
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-publish:
    uses: madfam-org/enclii/.github/workflows/build-publish.yml@main
    with:
      image_prefix: ghcr.io/madfam-org/digifab-quoting
      kustomization_path: infra/k8s/production
      services: |
        [
          {"name":"api",    "dockerfile":"apps/api/Dockerfile"},
          {"name":"web",    "dockerfile":"apps/web/Dockerfile"},
          {"name":"worker", "dockerfile":"apps/worker/Dockerfile"}
        ]
    secrets: inherit
    permissions:
      contents: write
      packages: write
      id-token: write
