name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20.x'
  PYTHON_VERSION: '3.11'

jobs:
  networkpolicy-port-lint:
    name: NetworkPolicy port consistency
    runs-on: ubuntu-latest
    timeout-minutes: 3
    # Prevents the 2026-05-04 status.enclii.dev outage class:
    # NetworkPolicy `ports:` clauses that don't intersect the selected pods'
    # containerPorts (silent CNI drop, hours to diagnose).
    # See scripts/check-networkpolicy-ports.py for full rationale.
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Run NetworkPolicy port lint
        run: python3 scripts/check-networkpolicy-ports.py infra/k8s/

  # ─── Security: prevent TODO-flagged auth from shipping (Audit R3 follow-up) ──
  security-todo-auth-grep:
    name: Security — No TODO-auth markers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if TODO comments mention auth in source
        run: |
          # Reject patterns like "TODO: Add auth", "TODO add authn", "// TODO: Authz".
          # Source dirs only — vendored deps and build artefacts excluded.
          if grep -RInE "TODO[^\n]*[Aa]uth" apps packages 2>/dev/null \
              | grep -vE "(node_modules|__pycache__|\.next|dist/|build/|\.turbo)"; then
            echo "::error::Found TODO comment referencing auth. Fix or remove the TODO before merge."
            exit 1
          fi
          echo "OK: no TODO-auth markers in source."

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Configure npm registry auth
        run: echo "//npm.madfam.io/:_authToken=${{ secrets.NPM_MADFAM_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

      - name: Check formatting
        # pnpm exec resolves the lockfile-pinned prettier; npx can drift to a
        # newer release with different formatting output.
        run: pnpm exec prettier --check "**/*.{ts,tsx,js,jsx,json,css,md}"

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Configure npm registry auth
        run: echo "//npm.madfam.io/:_authToken=${{ secrets.NPM_MADFAM_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        credentials:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        credentials:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Configure npm registry auth
        run: echo "//npm.madfam.io/:_authToken=${{ secrets.NPM_MADFAM_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build @cotiza/api's workspace deps (shared, pricing-engine, …) so
      # ts-jest can resolve their type declarations from dist/. Jest's runtime
      # moduleNameMapper points at source, but the ts-jest type-checker
      # resolves @cotiza/* via node_modules → package "types" (dist/*.d.ts),
      # which don't exist until these are built. This job runs jest directly
      # (not via turbo), so it must build deps itself.
      - name: Build workspace dependencies
        run: pnpm --filter "@cotiza/api^..." run build

      - name: Generate Prisma client
        run: pnpm --filter @cotiza/api run db:generate

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        run: pnpm --filter @cotiza/api run db:push

      - name: Run API tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
        run: pnpm --filter @cotiza/api run test

  test-worker:
    name: Worker Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: ./apps/worker
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run worker tests
        working-directory: ./apps/worker
        run: |
          # Allow exit code 5 (no tests collected) until worker test suite is built out.
          pytest || [ $? -eq 5 ]

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Configure npm registry auth
        run: echo "//npm.madfam.io/:_authToken=${{ secrets.NPM_MADFAM_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/*/dist
            apps/*/.next
            packages/*/dist

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, web, worker]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/${{ matrix.service }}/Dockerfile
          push: false
          tags: cotiza/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # BuildKit secret mirrors the production reusable workflow. It is
          # required by apps/web/Dockerfile for private @madfam packages; api
          # and worker ignore it harmlessly.
          secrets: |
            npmrc=//npm.madfam.io/:_authToken=${{ secrets.NPM_MADFAM_TOKEN }}

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Configure npm registry auth
        run: echo "//npm.madfam.io/:_authToken=${{ secrets.NPM_MADFAM_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type checking
        # Use turbo so the `^build` dependency in turbo.json fires first
        # (pricing-engine's tsc needs @cotiza/shared's dist/ to exist).
        run: pnpm exec turbo run typecheck --filter=@cotiza/shared --filter=@cotiza/pricing-engine --filter=@cotiza/ui
