name: cotiza

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: cotiza-api
    ports:
      - '8200:4000'
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-replace-with-local-or-secret-store-database-url}
      REDIS_URL: ${REDIS_URL:-replace-with-local-or-secret-store-redis-url}
      JWT_SECRET: ${JWT_SECRET:-replace-with-local-jwt-secret}
      # Shared JWT secret for cross-service authentication (MADFAM ecosystem)
      JANUA_JWT_SECRET: ${JANUA_JWT_SECRET:-replace-with-local-janua-secret-if-required}
      JANUA_API_URL: http://janua-api:8001
      S3_BUCKET: cotiza-quoting-dev
      AWS_REGION: us-east-1
      MINIO_ENDPOINT: madfam-minio-shared:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-replace-with-local-minio-access-key}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-replace-with-local-minio-secret-key}
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/api/node_modules
    command: npx turbo run dev --filter=@cotiza/api
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: cotiza-web
    ports:
      - '3030:3002'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8200/api/v1
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    depends_on:
      - api
    command: npx turbo run dev --filter=@cotiza/web
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3002/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile.dev
    container_name: cotiza-worker
    ports:
      - '8201:8000'
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: ${DATABASE_URL:-replace-with-local-or-secret-store-database-url}
      REDIS_URL: ${REDIS_URL:-replace-with-local-or-secret-store-redis-url}
    volumes:
      - ./apps/worker:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  default:
    name: madfam-shared-network
    external: true
