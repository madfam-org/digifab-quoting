apiVersion: enclii.dev/v1
kind: Service
metadata:
  name: digifab-quoting-api
  project: digifab-quoting
  description: Cotiza Studio API for digital-fabrication quote generation

spec:
  build:
    type: dockerfile
    dockerfile: apps/api/Dockerfile
    context: .
    source:
      git:
        repository: https://github.com/madfam-org/digifab-quoting
        branch: main
        autoDeploy: true

  runtime:
    port: 4000
    replicas: 2
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"
    healthCheck: /api/docs
    readinessProbe:
      path: /api/docs
      initialDelaySeconds: 10
      periodSeconds: 10
    livenessProbe:
      path: /api/docs
      initialDelaySeconds: 20
      periodSeconds: 30

  env:
    - name: NODE_ENV
      value: production
    - name: PORT
      value: "4000"
    - name: FORGESIGHT_API_URL
      value: https://api.forgesight.quest
    - name: YANTRA4D_API_URL
      value: https://api.yantra4d.com

  domains:
    - domain: api.cotiza.studio
      tls: true
      tlsIssuer: cloudflare

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

  slo:
    availability: 99.9
    latencyP95: 500
    errorRate: 0.5
